  <!-- Emoji Camion 🚚 -->
  <text x="128" y="120" font-size="100" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, Arial">🚚</text>

  <!-- Texte "BUT RESTITUTION" -->
  <text x="128" y="210" font-size="18" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">
    BUT RESTITUTION
  </text>

  <!-- Élément décoratif subtil -->
  <circle cx="50" cy="50" r="20" fill="white" opacity="0.1"/>
  <circle cx="220" cy="220" r="15" fill="white" opacity="0.1"/>
</svg>
