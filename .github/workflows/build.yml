name: Build Installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Create icon
        run: node create-icon.js
      - name: Install dependencies
        run: npm install
      - name: Build installers
        run: npm run build
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: installers
          path: dist/*.exe
          retention-days: 30
